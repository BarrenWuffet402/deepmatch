<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/config.js"></script>
  <title>DeepMatch — AI Studio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F7EFE2; --surface: #FBF6EC; --surface-2: #FFFFFF;
      --border: rgba(74,44,33,0.10); --border-h: rgba(74,44,33,0.22);
      --ink: #2A1F1A; --muted: rgba(74,44,33,0.50);
      --coral: #C26F6A; --violet: #9E4E4A; --green: #5C7050;
      --red: #b84040; --gold: #C9926A; --teal: #8B9D7E;
    }
    body {
      background:
        radial-gradient(900px 500px at 85% -5%, rgba(194,111,106,0.14), transparent 60%),
        radial-gradient(700px 400px at -5% 40%, rgba(232,184,148,0.22), transparent 60%),
        var(--bg);
    }
    body { background: var(--bg); color: var(--ink); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, sans-serif; min-height: 100vh; }
    a { color: var(--coral); text-decoration: none; }

    /* ── HEADER ── */
    header { border-bottom: 1px solid var(--border); padding: 18px 28px; display: flex; align-items: center; gap: 12px; }
    .logo { font-size: 20px; font-weight: 700; letter-spacing: -0.03em; }
    .logo a { color: var(--ink); text-decoration: none; }
    .logo-dot { color: var(--coral); }
    header .sub { font-size: 13px; color: var(--muted); margin-left: 4px; }
    .back-link { margin-left: auto; font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 5px; padding: 6px 12px; border: 1px solid var(--border); border-radius: 20px; transition: color .2s, border-color .2s; }
    .back-link:hover { color: var(--ink); border-color: var(--border-h); text-decoration: none; }

    /* ── LAYOUT ── */
    main { max-width: 1200px; margin: 0 auto; padding: 32px 32px 80px; display: grid; grid-template-columns: 1fr 480px; gap: 32px; align-items: start; }
    @media (max-width: 900px) { main { grid-template-columns: 1fr; } }
    .section-title { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }

    /* ── TABS ── */
    .tabs { display: flex; gap: 4px; margin-bottom: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 4px; }
    .tab {
      flex: 1; padding: 8px 4px; border: none; border-radius: 7px; background: transparent;
      color: var(--muted); font-size: 12px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .tab.active { background: var(--surface-2); color: var(--ink); border: 1px solid var(--border-h); }
    .tab-badge { font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 5px; border-radius: 4px; }
    .badge-heygen  { background: rgba(194,111,106,0.14); color: #9E4E4A; border: 1px solid rgba(194,111,106,0.30); }
    .badge-agent   { background: rgba(158,78,74,0.12);   color: #7A3830; border: 1px solid rgba(158,78,74,0.28); }
    .badge-seedance{ background: rgba(139,157,126,0.15); color: #5C7050; border: 1px solid rgba(139,157,126,0.30); }

    /* ── PANEL ── */
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: flex; flex-direction: column; gap: 14px; }

    /* ── FORM ELEMENTS ── */
    label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 5px; }
    .field-hint { font-size: 11px; color: var(--muted); opacity: 0.7; font-weight: 400; margin-left: 4px; }
    input[type="text"], textarea, select {
      width: 100%; background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 8px; padding: 9px 12px; color: var(--ink); font-family: inherit;
      font-size: 13px; transition: border-color .2s; outline: none;
    }
    input:focus, textarea:focus, select:focus { border-color: rgba(255,61,110,0.5); }
    textarea { resize: vertical; min-height: 120px; line-height: 1.55; }
    select option { background: #1e1e1e; }
    .char-count { font-size: 11px; color: var(--muted); text-align: right; margin-top: 3px; }
    .char-count.warn { color: var(--gold); }
    .char-count.over { color: var(--red); }

    /* two-column fields */
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* orientation toggle */
    .orient-row { display: flex; gap: 8px; }
    .orient-btn { flex: 1; padding: 7px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-size: 12px; font-family: inherit; cursor: pointer; transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 5px; }
    .orient-btn.active { border-color: rgba(255,61,110,0.5); color: var(--ink); background: rgba(255,61,110,0.08); }

    /* generate button */
    .btn-generate { width: 100%; height: 46px; border: none; border-radius: 10px; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity .2s, transform .1s; }
    .btn-generate:active { transform: scale(0.98); }
    .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-heygen   { background: linear-gradient(135deg, #9E4E4A 0%, #C26F6A 100%); }
    .btn-agent    { background: linear-gradient(135deg, #7A3830 0%, #9E4E4A 100%); }
    .btn-seedance { background: linear-gradient(135deg, #5C7050 0%, #8B9D7E 100%); }

    /* ── PROGRESS ── */
    .progress-area { display: none; background: rgba(158,78,74,0.06); border: 1px solid rgba(158,78,74,0.18); border-radius: 10px; padding: 14px; }
    .progress-area.show { display: block; }
    .progress-label { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .spinner { width: 13px; height: 13px; border: 2px solid rgba(74,44,33,0.12); border-top-color: var(--violet); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .progress-steps { display: flex; flex-direction: column; gap: 7px; }
    .step-item { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 7px; }
    .step-item.done { color: var(--green); }
    .step-item.active { color: var(--ink); }
    .step-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
    .step-item.done .step-dot { background: var(--green); }
    .step-item.active .step-dot { background: var(--violet); box-shadow: 0 0 6px var(--violet); }

    /* ── MSG ── */
    .msg { font-size: 13px; padding: 10px 14px; border-radius: 8px; display: none; }
    .msg.show { display: block; }
    .msg.ok  { background: rgba(62,207,142,0.1);  border: 1px solid rgba(62,207,142,0.25);  color: var(--green); }
    .msg.err { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.25); color: var(--red); }

    /* ── LIBRARY ── */
    #library { display: grid; gap: 10px; }
    .video-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; display: flex; align-items: center; gap: 14px; transition: border-color .15s; }
    .video-card:hover { border-color: var(--border-h); }
    .card-thumb { width: 48px; height: 64px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--muted); }
    .thumb-heygen   { background: linear-gradient(135deg, rgba(194,111,106,0.18), rgba(232,184,148,0.18)); border: 1px solid rgba(194,111,106,0.22); }
    .thumb-agent    { background: linear-gradient(135deg, rgba(158,78,74,0.18), rgba(194,111,106,0.12)); border: 1px solid rgba(158,78,74,0.22); }
    .thumb-seedance { background: linear-gradient(135deg, rgba(139,157,126,0.18), rgba(201,146,106,0.18)); border: 1px solid rgba(139,157,126,0.22); }
    .card-thumb svg { width: 18px; height: 18px; }
    .card-body { flex: 1; min-width: 0; }
    .card-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-meta { font-size: 12px; color: var(--muted); margin-top: 3px; display: flex; gap: 7px; align-items: center; }
    .src-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; }
    .src-heygen   { background: rgba(194,111,106,0.14); color: #9E4E4A; }
    .src-agent    { background: rgba(158,78,74,0.12);   color: #7A3830; }
    .src-seedance { background: rgba(139,157,126,0.15); color: #5C7050; }
    .card-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .icon-btn { width: 32px; height: 32px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 7px; display: flex; align-items: center; justify-content: center; color: var(--muted); cursor: pointer; transition: border-color .15s, color .15s; text-decoration: none; }
    .icon-btn:hover { border-color: var(--border-h); color: var(--ink); }
    .icon-btn svg { width: 14px; height: 14px; }
    .empty-library { font-size: 14px; color: var(--muted); padding: 32px 0; text-align: center; }

    /* toast */
    #copiedTip { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.12); color: var(--ink); font-size: 13px; padding: 8px 18px; border-radius: 20px; pointer-events: none; opacity: 0; transition: opacity .2s; z-index: 50; }
    #copiedTip.show { opacity: 1; }
  </style>
</head>
<body>

<header>
  <div class="logo"><a href="/" id="logoLink">deepmatch<span class="logo-dot">.</span></a></div>
  <span class="sub">ai studio</span>
  <a href="/" class="back-link">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15,18 9,12 15,6"/></svg>
    Home
  </a>
</header>

<main>
  <!-- LEFT: library -->
  <div>
    <div class="section-title">Generated videos</div>
    <div id="library"><div class="empty-library">Loading…</div></div>
  </div>

  <!-- RIGHT: generate panel -->
  <div>
    <div class="section-title">Generate new video</div>

    <!-- Mode tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('heygen')">
        <span class="tab-badge badge-heygen">HeyGen</span> Avatar
      </button>
      <button class="tab" onclick="switchTab('agent')">
        <span class="tab-badge badge-agent">Agent</span> Video
      </button>
      <button class="tab" onclick="switchTab('seedance')">
        <span class="tab-badge badge-seedance">Seedance</span> Scene
      </button>
      <button class="tab" onclick="switchTab('import')" id="tab-import">
        <span class="tab-badge" style="background:rgba(74,44,33,0.10);color:var(--text-soft);border:1px solid var(--line-2);">Import</span>
      </button>
    </div>

    <div class="panel">

      <!-- ── TAB 1: HeyGen Standard ── -->
      <div class="tab-panel active" id="panel-heygen">
        <div>
          <label>Title</label>
          <input type="text" id="h-title" placeholder="Sofia, 27 — intro" maxlength="80">
        </div>
        <div>
          <label>Slug <span class="field-hint">(/watch/…)</span></label>
          <input type="text" id="h-slug" placeholder="sofia-intro" maxlength="60">
        </div>
        <div class="field-row">
          <div>
            <label>Looks ID <span class="field-hint">avatar_id</span></label>
            <input type="text" id="h-looks" placeholder="default from env">
          </div>
          <div>
            <label>Voice ID</label>
            <input type="text" id="h-voice" placeholder="default from env">
          </div>
        </div>
        <div>
          <label>Script <span class="field-hint">what the avatar says</span></label>
          <textarea id="h-script" placeholder="Hi, I'm Sofia. I'm 27, from Stockholm…" maxlength="500"></textarea>
          <div class="char-count" id="h-chars">0 / 500</div>
        </div>
        <div>
          <label>Orientation</label>
          <div class="orient-row">
            <button class="orient-btn active" id="h-portrait" onclick="setOrient('heygen','portrait')">
              <svg width="10" height="15" viewBox="0 0 10 15" fill="none"><rect x="1" y="1" width="8" height="13" rx="1.5" stroke="currentColor" stroke-width="1.5"/></svg> Portrait
            </button>
            <button class="orient-btn" id="h-landscape" onclick="setOrient('heygen','landscape')">
              <svg width="15" height="10" viewBox="0 0 15 10" fill="none"><rect x="1" y="1" width="13" height="8" rx="1.5" stroke="currentColor" stroke-width="1.5"/></svg> Landscape
            </button>
          </div>
        </div>
        <button class="btn-generate btn-heygen" onclick="generate('heygen')">Generate avatar video →</button>
      </div>

      <!-- ── TAB 2: Video Agent ── -->
      <div class="tab-panel" id="panel-agent">
        <div>
          <label>Title</label>
          <input type="text" id="a-title" placeholder="Sofia, 27 — profile" maxlength="80">
        </div>
        <div>
          <label>Slug <span class="field-hint">(/watch/…)</span></label>
          <input type="text" id="a-slug" placeholder="sofia-agent" maxlength="60">
        </div>
        <div class="field-row">
          <div>
            <label>Looks ID <span class="field-hint">optional override</span></label>
            <input type="text" id="a-looks" placeholder="default from env">
          </div>
          <div>
            <label>Voice ID <span class="field-hint">optional override</span></label>
            <input type="text" id="a-voice" placeholder="default from env">
          </div>
        </div>
        <div>
          <label>Prompt <span class="field-hint">describe the video you want</span></label>
          <textarea id="a-prompt" style="min-height:120px" placeholder="Create a 20-second dating app profile video. Sofia, 27, from Stockholm, speaks directly to camera in a warm cozy apartment. She says: Hi, I am Sofia. Looking for someone genuine and a little intense. Cinematic, soft natural light, portrait format."></textarea>
          <div class="char-count" id="a-chars">0 / 800</div>
        </div>
        <div>
          <label>Orientation</label>
          <div class="orient-row">
            <button class="orient-btn active" id="a-portrait" onclick="setOrient('agent','portrait')">
              <svg width="10" height="15" viewBox="0 0 10 15" fill="none"><rect x="1" y="1" width="8" height="13" rx="1.5" stroke="currentColor" stroke-width="1.5"/></svg> Portrait
            </button>
            <button class="orient-btn" id="a-landscape" onclick="setOrient('agent','landscape')">
              <svg width="15" height="10" viewBox="0 0 15 10" fill="none"><rect x="1" y="1" width="13" height="8" rx="1.5" stroke="currentColor" stroke-width="1.5"/></svg> Landscape
            </button>
          </div>
        </div>
        <button class="btn-generate btn-agent" onclick="generate('agent')">Generate agent video →</button>
      </div>

      <!-- ── TAB 3: Seedance ── -->
      <div class="tab-panel" id="panel-seedance">
        <div>
          <label>Title</label>
          <input type="text" id="s-title" placeholder="Sofia walking in Stockholm" maxlength="80">
        </div>
        <div>
          <label>Slug <span class="field-hint">(/watch/…)</span></label>
          <input type="text" id="s-slug" placeholder="sofia-scene" maxlength="60">
        </div>
        <div>
          <label>Scene prompt <span class="field-hint">describe what happens</span></label>
          <textarea id="s-prompt" style="min-height:100px" placeholder="A young woman walks through Stockholm old town at golden hour, smiling gently at the camera, handheld aesthetic, 35mm film look" maxlength="600"></textarea>
          <div class="char-count" id="s-chars">0 / 600</div>
        </div>
        <div class="field-row">
          <div>
            <label>Style <span class="field-hint">e.g. "cinematic" or "anime"</span></label>
            <input type="text" id="s-style" placeholder="cinematic, warm tones" maxlength="100">
          </div>
          <div>
            <label>Style ID <span class="field-hint">numeric if known</span></label>
            <input type="text" id="s-style-id" placeholder="optional" maxlength="40">
          </div>
        </div>
        <div class="field-row">
          <div>
            <label>Duration</label>
            <select id="s-duration">
              <option value="5">5 seconds</option>
              <option value="10">10 seconds</option>
            </select>
          </div>
          <div>
            <label>Aspect ratio</label>
            <select id="s-ratio">
              <option value="9:16">9:16 Portrait</option>
              <option value="16:9">16:9 Landscape</option>
              <option value="1:1">1:1 Square</option>
            </select>
          </div>
        </div>
        <button class="btn-generate btn-seedance" onclick="generate('seedance')">Generate scene →</button>
      </div>

      <!-- ── TAB 4: Import from HeyGen ── -->
      <div class="tab-panel" id="panel-import">
        <div style="font-size:13px;color:var(--text-soft);margin-bottom:12px;">Recent HeyGen Video Agent sessions. Click to import into library.</div>
        <div id="sessionList" style="display:grid;gap:8px;"><div style="font-size:13px;color:var(--muted);">Loading sessions…</div></div>
      </div>

      <!-- Progress + message (shared) -->
      <div class="progress-area" id="progressArea">
        <div class="progress-label">
          <div class="spinner" id="progressSpinner"></div>
          <span id="progressLabel">Generating…</span>
        </div>
        <div class="progress-steps" id="progressSteps"></div>
      </div>

      <div class="msg" id="statusMsg"></div>
    </div>
  </div>
</main>

<div id="copiedTip">Copied!</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const orientState = { heygen: 'portrait', agent: 'portrait' };
let pollTimer = null;
let activeTab = 'heygen';

// ── Tab switching ──────────────────────────────────────────────────────────
function switchTab(name) {
  activeTab = name;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['heygen','agent','seedance','import'][i] === name);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${name}`).classList.add('active');
  hideMsg();
  if (name === 'import') loadSessions();
}

// ── Import from HeyGen sessions ───────────────────────────────────
async function loadSessions() {
  const el = document.getElementById('sessionList');
  el.innerHTML = '<div style="font-size:13px;color:var(--muted);">Loading…</div>';
  try {
    const d = await get('/api/heygen-sessions');
    if (!d.sessions?.length) {
      el.innerHTML = '<div style="font-size:13px;color:var(--muted);">No sessions found.</div>';
      return;
    }
    el.innerHTML = d.sessions.map(s => {
      const date = s.created_at ? new Date(s.created_at * 1000).toLocaleDateString() : '';
      const sid = esc(s.session_id);
      const stitle = esc(s.title);
      const canImport = s.video_status === 'completed';
      const statusLabel = s.video_status === 'completed' ? '✓ ready'
                        : s.video_status === 'processing' ? '⏳ rendering'
                        : s.video_id ? '⏳ rendering'
                        : '— no video';
      return `
        <div style="background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
            <div style="flex:1;min-width:120px;">
              <div style="font-size:13px;font-weight:600;word-break:break-word;">${stitle}</div>
              <div style="font-size:11px;color:var(--muted);margin-top:3px;">${date} · ${statusLabel}</div>
            </div>
            ${canImport
              ? `<button onclick="importSession('${sid}','${stitle}')"
                  style="flex-shrink:0;height:32px;padding:0 16px;background:var(--grad);border:none;border-radius:8px;color:white;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;">
                  Import
                </button>`
              : `<span style="flex-shrink:0;font-size:11px;color:var(--muted);">${statusLabel}</span>`
            }
          </div>
        </div>`;
    }).join('');
  } catch(e) {
    el.innerHTML = `<div style="font-size:13px;color:var(--red);">${e.message}</div>`;
  }
}

async function importSession(sessionId, defaultTitle) {
  const slug = prompt('Slug for this video (e.g. sofia-agent):');
  if (!slug) return;
  if (!validSlug(slug)) { showMsg('err', 'Invalid slug'); return; }
  const title = defaultTitle || slug;

  showMsg('ok', 'Fetching video…');
  try {
    const d = await get(`/api/heygen-sessions?session_id=${encodeURIComponent(sessionId)}`);
    if (!d.video_url) throw new Error('Video not ready yet — check back in a moment');
    await saveVideo({ video_id: d.video_id, video_url: d.video_url, slug, title, source: 'agent' });
    showMsg('ok', `✓ Imported — /watch/${slug}`);
    await loadLibrary();
  } catch(e) { showMsg('err', e.message); }
}

// ── Orientation ────────────────────────────────────────────────────────────
function setOrient(tab, o) {
  orientState[tab] = o;
  const prefix = tab === 'heygen' ? 'h' : 'a';
  document.getElementById(`${prefix}-portrait`).classList.toggle('active', o === 'portrait');
  document.getElementById(`${prefix}-landscape`).classList.toggle('active', o === 'landscape');
}

// ── Char counters ──────────────────────────────────────────────────────────
function initCharCounter(textareaId, counterId, max) {
  const ta = document.getElementById(textareaId);
  const ct = document.getElementById(counterId);
  ta.addEventListener('input', () => {
    const n = ta.value.length;
    ct.textContent = `${n} / ${max}`;
    ct.className = 'char-count' + (n > max * 0.9 ? (n > max * 0.98 ? ' over' : ' warn') : '');
  });
}
initCharCounter('h-script', 'h-chars', 500);
initCharCounter('a-prompt', 'a-chars', 800);
initCharCounter('s-prompt', 's-chars', 600);

// ── Auto-slug from title ───────────────────────────────────────────────────
function wireSlug(titleId, slugId) {
  const ti = document.getElementById(titleId);
  const si = document.getElementById(slugId);
  ti.addEventListener('input', () => {
    if (!si.dataset.manual)
      si.value = ti.value.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').slice(0, 60);
  });
  si.addEventListener('input', () => { si.dataset.manual = '1'; });
}
wireSlug('h-title', 'h-slug');
wireSlug('a-title', 'a-slug');
wireSlug('s-title', 's-slug');

// ── Progress helpers ───────────────────────────────────────────────────────
function showProgress(steps) {
  const area = document.getElementById('progressArea');
  const stepsEl = document.getElementById('progressSteps');
  area.classList.add('show');
  stepsEl.innerHTML = steps.map((s, i) =>
    `<div class="step-item" id="pstep-${i}"><div class="step-dot"></div>${s}</div>`
  ).join('');
  setStep(0, 'active');
}
function setStep(i, state) {
  const el = document.getElementById(`pstep-${i}`);
  if (!el) return;
  el.className = `step-item ${state}`;
}
function setLabel(t) { document.getElementById('progressLabel').textContent = t; }
function hideProgress() { document.getElementById('progressArea').classList.remove('show'); }

function showMsg(type, text) {
  const el = document.getElementById('statusMsg');
  el.className = `msg show ${type}`; el.textContent = text;
}
function hideMsg() {
  const el = document.getElementById('statusMsg');
  el.className = 'msg'; el.textContent = '';
}

function setGenerating(on) {
  document.querySelectorAll('.btn-generate').forEach(b => b.disabled = on);
  document.querySelectorAll('.tab').forEach(b => b.disabled = on);
  if (!on) hideProgress();
}

// ── Generate dispatcher ────────────────────────────────────────────────────
async function generate(mode) {
  hideMsg();
  clearTimeout(pollTimer);

  if (mode === 'heygen')   return generateHeygen();
  if (mode === 'agent')    return generateAgent();
  if (mode === 'seedance') return generateSeedance();
}

// ── HeyGen Standard ────────────────────────────────────────────────────────
async function generateHeygen() {
  const title  = val('h-title');
  const slug   = val('h-slug');
  const script = val('h-script');
  const looks  = val('h-looks') || undefined;
  const voice  = val('h-voice') || undefined;

  if (!title || !slug || !script) return showMsg('err', 'Title, slug and script are required.');
  if (!validSlug(slug))           return showMsg('err', 'Slug: lowercase letters, numbers, hyphens only.');

  setGenerating(true);
  showProgress(['Script submitted', 'Avatar rendering (1–3 min)', 'Video ready', 'Saved to library']);

  try {
    const r = await post('/api/heygen', { mode: 'standard', script, slug, title, portrait: orientState.heygen === 'portrait', looks_id: looks, voice_id: voice });
    setStep(0, 'done'); setStep(1, 'active'); setLabel('Avatar rendering…');
    await pollHeygenStatus(r.video_id, slug, title, [1, 2, 3]);
  } catch(e) { setGenerating(false); showMsg('err', e.message); }
}

// ── Video Agent ────────────────────────────────────────────────────────────
async function generateAgent() {
  const title  = val('a-title');
  const slug   = val('a-slug');
  const prompt = val('a-prompt');
  const looks  = val('a-looks') || undefined;
  const voice  = val('a-voice') || undefined;

  if (!title || !slug || !prompt) return showMsg('err', 'Title, slug and prompt are required.');
  if (!validSlug(slug))           return showMsg('err', 'Slug: lowercase letters, numbers, hyphens only.');

  setGenerating(true);
  showProgress(['Prompt submitted to Video Agent', 'Agent planning + rendering', 'Video ready', 'Saved to library']);

  try {
    const r = await post('/api/heygen', { mode: 'agent', script: prompt, slug, title, portrait: orientState.agent === 'portrait', looks_id: looks, voice_id: voice });
    setStep(0, 'done'); setStep(1, 'active'); setLabel('Agent planning + rendering… (2–5 min)');
    if (r.video_id) {
      // Agent returned a video_id immediately — poll standard status
      await pollHeygenStatus(r.video_id, slug, title, [1, 2, 3]);
    } else if (r.session_id) {
      // Agent is still planning — poll session first, then switch to video status
      await pollAgentSession(r.session_id, slug, title);
    } else {
      throw new Error('No video_id or session_id returned from Video Agent');
    }
  } catch(e) { setGenerating(false); showMsg('err', e.message); }
}

// ── Seedance ───────────────────────────────────────────────────────────────
async function generateSeedance() {
  const title    = val('s-title');
  const slug     = val('s-slug');
  const prompt   = val('s-prompt');
  const style    = val('s-style') || undefined;
  const styleId  = val('s-style-id') || undefined;
  const duration = document.getElementById('s-duration').value;
  const ratio    = document.getElementById('s-ratio').value;

  if (!title || !slug || !prompt) return showMsg('err', 'Title, slug and prompt are required.');
  if (!validSlug(slug))           return showMsg('err', 'Slug: lowercase letters, numbers, hyphens only.');

  setGenerating(true);
  showProgress(['Scene submitted to Seedance', 'Generating video (fal.ai)', 'Video ready', 'Saved to library']);

  try {
    const r = await post('/api/seedance', { prompt, slug, title, duration, aspect_ratio: ratio, style, style_id: styleId });
    setStep(0, 'done'); setStep(1, 'active'); setLabel('Generating scene… (1–3 min)');
    await pollSeedanceStatus(r.request_id, slug, title, r.status_url, r.response_url);
  } catch(e) { setGenerating(false); showMsg('err', e.message); }
}

// ── Agent session polling (when video_id not yet available) ────────────────
async function pollAgentSession(sessionId, slug, title) {
  clearTimeout(pollTimer);
  try {
    const d = await get(`/api/heygen-sessions?session_id=${encodeURIComponent(sessionId)}`);
    if (d.error) throw new Error(d.error);

    if (d.video_id && d.video_status === 'completed' && d.video_url) {
      // Fully done
      setStep(2, 'done'); setStep(3, 'active'); setLabel('Saving to library…');
      await saveVideo({ video_id: d.video_id, video_url: d.video_url, slug, title });
      setStep(3, 'done'); setLabel('Done!');
      setGenerating(false);
      showMsg('ok', `✓ Agent video ready — /watch/${slug}`);
      resetForm('a');
    } else if (d.video_id && d.video_status !== 'failed') {
      // Has video_id, still rendering — switch to standard HeyGen poll
      setLabel('Rendering video…');
      await pollHeygenStatus(d.video_id, slug, title, [1, 2, 3]);
    } else if (d.agent_status === 'failed' || d.video_status === 'failed') {
      throw new Error('Video Agent generation failed.');
    } else {
      // Still planning/generating
      setLabel(`Agent working… (status: ${d.agent_status || 'generating'})`);
      pollTimer = setTimeout(() => pollAgentSession(sessionId, slug, title), 10000);
    }
  } catch(e) { setGenerating(false); showMsg('err', e.message); }
}

// ── Polling helpers ────────────────────────────────────────────────────────
async function pollHeygenStatus(videoId, slug, title, steps) {
  clearTimeout(pollTimer);
  try {
    const d = await get(`/api/heygen?video_id=${encodeURIComponent(videoId)}`);
    if (d.status === 'completed' && d.video_url) {
      setStep(steps[1], 'done'); setStep(steps[2], 'active'); setLabel('Saving to library…');
      await saveVideo({ video_id: videoId, video_url: d.video_url, slug, title });
      setStep(steps[2], 'done'); setLabel('Done!');
      setGenerating(false);
      showMsg('ok', `✓ Video ready — /watch/${slug}`);
      resetForm(activeTab === 'agent' ? 'a' : 'h');
    } else if (d.status === 'failed') {
      throw new Error('Rendering failed. Check HeyGen dashboard.');
    } else {
      pollTimer = setTimeout(() => pollHeygenStatus(videoId, slug, title, steps), 8000);
    }
  } catch(e) { setGenerating(false); showMsg('err', e.message); }
}

async function pollSeedanceStatus(requestId, slug, title, statusUrl, responseUrl) {
  clearTimeout(pollTimer);
  try {
    let url = `/api/seedance?request_id=${encodeURIComponent(requestId)}`;
    if (statusUrl)   url += `&status_url=${statusUrl}`;
    if (responseUrl) url += `&response_url=${responseUrl}`;
    const d = await get(url);
    if (d.status === 'completed' && d.video_url) {
      setStep(2, 'done'); setStep(3, 'active'); setLabel('Saving to library…');
      await saveVideo({ video_id: null, video_url: d.video_url, slug, title, source: 'seedance' });
      setStep(3, 'done'); setLabel('Done!');
      setGenerating(false);
      showMsg('ok', `✓ Scene ready — /watch/${slug}`);
      resetForm('s');
    } else if (d.status === 'failed') {
      throw new Error(d.error || 'Seedance generation failed — try a different prompt.');
    } else {
      const qp = d.queue_position != null ? ` (queue pos: ${d.queue_position})` : '';
      setLabel(`Generating${qp}…`);
      pollTimer = setTimeout(() => pollSeedanceStatus(requestId, slug, title, statusUrl, responseUrl), 8000);
    }
  } catch(e) { setGenerating(false); showMsg('err', e.message); }
}

async function saveVideo({ video_id, video_url, slug, title, source }) {
  const r = await post('/api/heygen-save', { video_id, video_url, slug, title, source });
  await loadLibrary();
  return r;
}

// ── Fetch helpers ──────────────────────────────────────────────────────────
async function post(url, body) {
  const r = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  const d = await r.json();
  if (!r.ok) throw new Error(d.error || `HTTP ${r.status}`);
  return d;
}
async function get(url) {
  const r = await fetch(url);
  const d = await r.json();
  if (!r.ok) throw new Error(d.error || `HTTP ${r.status}`);
  return d;
}

function val(id) { return document.getElementById(id).value.trim(); }
function validSlug(s) { return /^[a-z0-9-]+$/.test(s); }

function resetForm(prefix) {
  ['title','slug','script','prompt','looks','voice','style'].forEach(f => {
    const el = document.getElementById(`${prefix}-${f}`);
    if (el) { el.value = ''; delete el.dataset.manual; }
  });
  ['chars'].forEach(f => {
    const el = document.getElementById(`${prefix}-${f}`);
    if (el) el.textContent = '0 / ' + (el.dataset.max || '500');
  });
}

// ── Library ────────────────────────────────────────────────────────────────
const SOURCE_META = {
  heygen:   { label: 'HeyGen',  cls: 'src-heygen',   thumb: 'thumb-heygen' },
  agent:    { label: 'Agent',   cls: 'src-agent',    thumb: 'thumb-agent' },
  seedance: { label: 'Seedance',cls: 'src-seedance',  thumb: 'thumb-seedance' },
};

async function loadLibrary() {
  const lib = document.getElementById('library');
  try {
    const list = await get('/api/videos');
    const aiVideos = list.filter(v => ['heygen','agent','seedance'].includes(v.source));
    if (!aiVideos.length) {
      lib.innerHTML = '<div class="empty-library">No AI videos yet.<br>Generate your first one →</div>';
      return;
    }
    lib.innerHTML = aiVideos.map(v => {
      const src  = SOURCE_META[v.source] || SOURCE_META.heygen;
      const url  = `${location.origin}/watch/${v.slug}`;
      const date = v.createdAt ? new Date(v.createdAt).toLocaleDateString() : '';
      return `
        <div class="video-card">
          <div class="card-thumb ${src.thumb}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="5,3 19,12 5,21"/>
            </svg>
          </div>
          <div class="card-body">
            <div class="card-title">${esc(v.title)}</div>
            <div class="card-meta">
              <span class="src-tag ${src.cls}">${src.label}</span>
              /watch/${esc(v.slug)}${date ? ' · ' + date : ''}
            </div>
          </div>
          <div class="card-actions">
            <button class="icon-btn" title="Copy link" onclick="copyUrl('${esc(url)}')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
            <a class="icon-btn" href="${esc(url)}" target="_blank" title="Open player">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5,3 19,12 5,21"/></svg>
            </a>
          </div>
        </div>`;
    }).join('');
  } catch { lib.innerHTML = '<div class="empty-library">Could not load library.</div>'; }
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function copyUrl(url) { navigator.clipboard.writeText(url).then(() => flash('Copied!')); }
function flash(msg) { const el = document.getElementById('copiedTip'); el.textContent = msg; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 1800); }

loadLibrary();

// Brand
const cfg = window.APP;
if (cfg) {
  document.title = `${cfg.name} — AI Studio`;
  const l = document.getElementById('logoLink');
  l.textContent = cfg.name.toLowerCase();
  l.insertAdjacentHTML('beforeend', '<span class="logo-dot">.</span>');
}
</script>
