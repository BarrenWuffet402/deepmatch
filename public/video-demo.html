<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#000">
  <script src="/config.js"></script>
  <title>Video Profile Demo — DeepMatch</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, sans-serif;
      overflow: hidden;
    }

    /* ── Full-screen container ── */
    #card {
      position: fixed;
      inset: 0;
    }

    /* ── Video fills screen ── */
    #profileVideo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #1a0e08;
    }

    /* ── Gradient fade at bottom so text is readable ── */
    #bottomGrad {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 55%;
      background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
      pointer-events: none;
    }

    /* ── Profile text overlay ── */
    #profile {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 24px 24px max(env(safe-area-inset-bottom, 0px), 28px);
      z-index: 5;
    }

    .name-line {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: #fff;
      margin-bottom: 6px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }
    .name-line span {
      font-weight: 400;
      opacity: 0.75;
      font-size: 20px;
    }

    .intent {
      font-size: 14px;
      color: rgba(255,255,255,0.75);
      line-height: 1.5;
      margin-bottom: 22px;
      max-width: 320px;
    }

    /* ── Action buttons ── */
    .actions {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .btn-pass {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      border: 1.5px solid rgba(255,255,255,0.22);
      color: rgba(255,255,255,0.85);
      font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .btn-pass:hover { background: rgba(255,255,255,0.25); }

    .btn-connect {
      flex: 1;
      height: 56px;
      border-radius: 28px;
      background: linear-gradient(135deg, #9E4E4A 0%, #C26F6A 100%);
      border: none;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      font-family: inherit;
      box-shadow: 0 8px 24px rgba(158,78,74,0.5);
    }
    .btn-connect:hover { opacity: 0.88; }
    .btn-connect:active { transform: scale(0.97); }

    /* ── Back nav ── */
    #backBtn {
      position: fixed;
      top: max(env(safe-area-inset-top, 0px), 16px);
      left: 16px;
      z-index: 20;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 20px;
      color: rgba(255,255,255,0.85);
      font-size: 14px;
      padding: 7px 14px 7px 10px;
      cursor: pointer;
      display: flex; align-items: center; gap: 5px;
      text-decoration: none;
      font-family: inherit;
      transition: background 0.15s;
    }
    #backBtn:hover { background: rgba(0,0,0,0.65); }

    /* ── Demo badge ── */
    #demoBadge {
      position: fixed;
      top: max(env(safe-area-inset-top, 0px), 16px);
      right: 16px;
      z-index: 20;
      background: rgba(158,78,74,0.25);
      border: 1px solid rgba(194,111,106,0.4);
      border-radius: 20px;
      color: rgba(255,220,210,0.9);
      font-size: 11px;
      padding: 5px 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Tap-to-play overlay (for mobile autoplay restrictions) ── */
    #tapPlay {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    #tapPlay .play-circle {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      border: 1.5px solid rgba(255,255,255,0.25);
      display: flex; align-items: center; justify-content: center;
    }
    #tapPlay svg { width: 28px; height: 28px; color: #fff; margin-left: 4px; }
    #tapPlay.hidden { display: none; }
  </style>
</head>
<body>

  <a id="backBtn" href="/">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15,18 9,12 15,6"/>
    </svg>
    Home
  </a>

  <div id="demoBadge">Demo</div>

  <div id="card">

    <!-- Video -->
    <video id="profileVideo" playsinline loop preload="auto"></video>

    <!-- Bottom gradient -->
    <div id="bottomGrad"></div>

    <!-- Tap to play (shown if autoplay blocked) -->
    <div id="tapPlay" onclick="startPlay()">
      <div class="play-circle">
        <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="6,3 20,12 6,21"/></svg>
      </div>
    </div>

    <!-- Profile strip -->
    <div id="profile">
      <div class="name-line" id="profileName">Sofia <span>27, Stockholm</span></div>
      <p class="intent" id="profileIntent">"Looking for someone who reads slowly and thinks deeply."</p>
      <div class="actions">
        <button class="btn-pass" title="Pass" onclick="nextProfile()">✕</button>
        <button class="btn-connect" id="connectBtn" onclick="onConnect()">Connect →</button>
      </div>
    </div>

  </div>

<script>
  // ── Profiles ──────────────────────────────────────────────────────────────
  const profiles = [
    {
      name: 'Sofia <span style="font-weight:400;opacity:.75;font-size:20px">27, Stockholm</span>',
      intent: '"Looking for someone who reads slowly and thinks deeply."',
      // Sofia in Stockholm — Seedance scene from R2
      videoSrc: 'https://v3b.fal.media/files/b/0a99d431/snnSqcZuxgAiJlm6t1xop_video.mp4',
    },
    {
      name: 'Marcus <span style="font-weight:400;opacity:.75;font-size:20px">31, Copenhagen</span>',
      intent: '"I want someone who challenges me — kindly."',
      // Fallback public domain clip for Marcus
      videoSrc: 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4',
    },
  ];

  let currentIdx = 0;
  const video = document.getElementById('profileVideo');
  const tapPlay = document.getElementById('tapPlay');

  function loadProfile(idx) {
    const p = profiles[idx];
    document.getElementById('profileName').innerHTML = p.name;
    document.getElementById('profileIntent').textContent = p.intent;
    video.src = p.videoSrc;
    video.load();
    video.play().then(() => {
      tapPlay.classList.add('hidden');
    }).catch(() => {
      // Autoplay blocked — show tap-to-play overlay
      tapPlay.classList.remove('hidden');
    });
  }

  function startPlay() {
    video.play().then(() => tapPlay.classList.add('hidden')).catch(() => {});
  }

  function onConnect() {
    const btn = document.getElementById('connectBtn');
    btn.textContent = '✓ Request sent';
    btn.style.background = 'linear-gradient(135deg,#4a7c59,#5c9e6e)';
    btn.disabled = true;
  }

  function nextProfile() {
    currentIdx = (currentIdx + 1) % profiles.length;
    // Reset connect button
    const btn = document.getElementById('connectBtn');
    btn.textContent = 'Connect →';
    btn.style.background = '';
    btn.disabled = false;
    loadProfile(currentIdx);
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  loadProfile(0);
</script>
</body>
</html>
