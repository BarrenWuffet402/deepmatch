<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#F7EFE2">
  <script src="/config.js"></script>
  <title>Video Profile Demo — DeepMatch</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #F7EFE2;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, sans-serif;
      color: #2A1F1A;
      overflow: hidden;
    }

    /* ── Full-screen card stack ── */
    #card {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
    }

    /* ── Video (takes most of the screen) ── */
    #playerWrap {
      position: relative;
      flex: 1;
      background: #1a0e08;
      overflow: hidden;
    }

    #playerWrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ── Profile strip at bottom ── */
    #profile {
      flex-shrink: 0;
      padding: 18px 20px max(env(safe-area-inset-bottom, 0px), 16px);
      background: linear-gradient(to top, #F7EFE2 55%, rgba(247,239,226,0.0));
      /* visually overlaps the bottom of the video */
      margin-top: -60px;
      position: relative;
      z-index: 10;
      pointer-events: none;
    }

    #profileInner {
      pointer-events: auto;
    }

    .name-line {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }
    .name-line span {
      font-weight: 400;
      opacity: 0.7;
      font-size: 18px;
    }

    .intent {
      font-size: 14px;
      color: rgba(74,44,33,0.60);
      line-height: 1.4;
      margin-bottom: 20px;
      max-width: 340px;
    }

    /* ── Action buttons ── */
    .actions {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .btn-pass {
      width: 54px; height: 54px;
      border-radius: 50%;
      background: rgba(255,255,255,0.65);
      border: 1.5px solid rgba(74,44,33,0.16);
      color: rgba(74,44,33,0.7);
      font-size: 22px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .btn-pass:hover { background: rgba(255,255,255,0.92); }

    .btn-connect {
      flex: 1;
      height: 54px;
      border-radius: 27px;
      background: linear-gradient(135deg, #9E4E4A 0%, #C26F6A 100%);
      border: none;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      font-family: inherit;
    }
    .btn-connect:hover { opacity: 0.88; }
    .btn-connect:active { transform: scale(0.97); }

    /* ── Back nav ── */
    #backBtn {
      position: fixed;
      top: max(env(safe-area-inset-top, 0px), 16px);
      left: 16px;
      z-index: 20;
      background: rgba(251,246,236,0.90);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(74,44,33,0.14);
      border-radius: 20px;
      color: #4A3A30;
      font-size: 14px;
      padding: 6px 14px 6px 10px;
      cursor: pointer;
      display: flex; align-items: center; gap: 5px;
      text-decoration: none;
      font-family: inherit;
    }
    #backBtn:hover { background: rgba(251,246,236,1); }

    /* ── Demo badge ── */
    #demoBadge {
      position: fixed;
      top: max(env(safe-area-inset-top, 0px), 16px);
      right: 16px;
      z-index: 20;
      background: rgba(194,111,106,0.14);
      border: 1px solid rgba(158,78,74,0.28);
      border-radius: 20px;
      color: rgba(158,78,74,0.85);
      font-size: 11px;
      padding: 5px 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <a id="backBtn" href="/">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15,18 9,12 15,6"/>
    </svg>
    Home
  </a>

  <div id="demoBadge">Demo</div>

  <div id="card">

    <!-- Video takes up most of the screen -->
    <div id="playerWrap">
      <iframe
        id="playerFrame"
        src=""
        allow="autoplay; fullscreen; picture-in-picture"
        allowfullscreen
      ></iframe>
    </div>

    <!-- Profile strip -->
    <div id="profile">
      <div id="profileInner">
        <div class="name-line">Sofia <span>27, Stockholm</span></div>
        <p class="intent">"Looking for someone who reads slowly and thinks deeply."</p>
        <div class="actions">
          <button class="btn-pass" title="Pass" onclick="nextProfile()">✕</button>
          <button class="btn-connect" onclick="onConnect()">Connect →</button>
        </div>
      </div>
    </div>

  </div>

<script>
  // ── Load player in iframe with a public test video ────────────────────────
  // Using a short, reliable public domain clip (Blender Foundation)
  const TEST_VIDEO = 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerFun.mp4';
  const TEST_TITLE = 'Sofia, 27';

  document.getElementById('playerFrame').src =
    `/player.html?src=${encodeURIComponent(TEST_VIDEO)}&title=${encodeURIComponent(TEST_TITLE)}`;

  // ── Mock interactions ─────────────────────────────────────────────────────
  function onConnect() {
    const btn = document.querySelector('.btn-connect');
    btn.textContent = '✓ Request sent';
    btn.style.background = '#22c55e';
    btn.disabled = true;
  }

  function nextProfile() {
    // In the real app this would load the next profile video
    document.querySelector('.name-line').innerHTML = 'Marcus <span>31, Copenhagen</span>';
    document.querySelector('.intent').textContent =
      '"I want someone who challenges me — kindly."';
    const TEST2 = 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4';
    document.getElementById('playerFrame').src =
      `/player.html?src=${encodeURIComponent(TEST2)}&title=${encodeURIComponent('Marcus, 31')}`;
    // Reset connect button
    const btn = document.querySelector('.btn-connect');
    btn.textContent = 'Connect →';
    btn.style.background = '';
    btn.disabled = false;
  }
</script>
</body>
</html>
