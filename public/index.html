<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#07060a">
  <title>DeepMatch</title>
  <script src="/config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, sans-serif;
      overflow: hidden;
    }

    /* CSS vars from config */
    :root {
      --accent:  #ff4d6d;
      --accent-b: #c2185b;
      --bg:      #07060a;
    }

    /* ── BACKGROUND ORBS ─────────────────────────────── */
    .orbs {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.18;
    }

    .orb-1 {
      width: 55vw;
      height: 55vw;
      background: radial-gradient(circle, #ff4d6d, #c2185b);
      top: -20vw;
      left: -10vw;
      animation: drift1 22s ease-in-out infinite;
    }

    .orb-2 {
      width: 40vw;
      height: 40vw;
      background: radial-gradient(circle, #9c27b0, #4a148c);
      bottom: -15vw;
      right: -5vw;
      animation: drift2 28s ease-in-out infinite;
    }

    .orb-3 {
      width: 28vw;
      height: 28vw;
      background: radial-gradient(circle, #ff6e40, #e64a19);
      top: 40%;
      left: 55%;
      animation: drift3 18s ease-in-out infinite;
      opacity: 0.1;
    }

    @keyframes drift1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%       { transform: translate(8vw, 6vw) scale(1.05); }
      66%       { transform: translate(-4vw, 10vw) scale(0.97); }
    }
    @keyframes drift2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      40%       { transform: translate(-10vw, -8vw) scale(1.08); }
      70%       { transform: translate(5vw, -4vw) scale(0.95); }
    }
    @keyframes drift3 {
      0%, 100% { transform: translate(0, 0); }
      50%       { transform: translate(-8vw, 6vw); }
    }

    /* ── NOISE TEXTURE ────────────────────────────────── */
    .noise {
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.028;
      pointer-events: none;
      z-index: 1;
    }

    /* ── STAGE ────────────────────────────────────────── */
    .stage {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 32px;
      text-align: center;
      gap: 0;
    }

    /* ── WORDMARK ─────────────────────────────────────── */
    .wordmark {
      font-size: clamp(52px, 11vw, 116px);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      background: linear-gradient(135deg, #ff8fa3 0%, #ff4d6d 45%, #c2185b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      user-select: none;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
    }

    /* ── TAGLINE ──────────────────────────────────────── */
    .tagline {
      margin-top: clamp(14px, 2.5vw, 26px);
      font-size: clamp(16px, 2.2vw, 26px);
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.45);
      user-select: none;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards;
    }

    /* ── DIVIDER DOT ──────────────────────────────────── */
    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      margin: clamp(28px, 4vw, 44px) auto 0;
      opacity: 0;
      animation: fadeIn 0.6s ease 1.0s forwards;
    }

    /* ── STATUS PILL ──────────────────────────────────── */
    .status {
      margin-top: clamp(22px, 3vw, 36px);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 16px;
      border-radius: 40px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      font-size: 12px;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      opacity: 0;
      animation: fadeIn 0.6s ease 1.2s forwards;
      user-select: none;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.7;
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.7; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.25); }
    }

    /* ── ADMIN LINK ───────────────────────────────────── */
    .admin-link {
      position: fixed;
      bottom: 24px;
      right: 24px;
      color: rgba(255,255,255,0.15);
      font-size: 12px;
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.2s;
      z-index: 10;
    }
    .admin-link:hover { color: rgba(255,255,255,0.45); }

    /* ── ANIMATIONS ───────────────────────────────────── */
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* ── MOBILE ───────────────────────────────────────── */
    @media (max-width: 480px) {
      .tagline { letter-spacing: 0.1em; }
    }
  </style>
</head>
<body>

<div class="orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<div class="noise"></div>

<div class="stage">
  <h1 class="wordmark" id="wordmark"></h1>
  <p class="tagline" id="tagline"></p>
  <div class="dot"></div>
  <div class="status">
    <span class="status-dot"></span>
    <span>Coming soon</span>
  </div>
</div>

<a class="admin-link" href="/admin.html">admin</a>

<script>
  document.getElementById('wordmark').textContent = window.APP.name;
  document.getElementById('tagline').textContent  = window.APP.tagline;
  document.documentElement.style.setProperty('--accent',   window.APP.accent);
  document.documentElement.style.setProperty('--accent-b', window.APP.accentB);
  document.documentElement.style.setProperty('--bg',       window.APP.bg);
  document.body.style.background = window.APP.bg;
  document.title = window.APP.name;
</script>
</body>
</html>
