<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/config.js"></script>
  <title>DeepMatch — Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0d;
      --surface: #181818;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.16);
      --ink: #f0f0f0;
      --muted: rgba(255,255,255,0.45);
      --accent: #e2e2e2;
      --accent-dim: rgba(226,226,226,0.08);
      --green: #3ecf8e;
      --red: #f87171;
    }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, sans-serif;
      min-height: 100vh;
    }
    a { color: var(--green); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── HEADER ─────────────────────────────────────────── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 18px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--ink);
    }
    .logo-dot { color: var(--green); }
    header .sub { font-size: 13px; color: var(--muted); margin-left: 4px; }

    /* ── LAYOUT ─────────────────────────────────────────── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 24px 60px;
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 28px;
      align-items: start;
    }

    @media (max-width: 720px) {
      main { grid-template-columns: 1fr; }
    }

    /* ── SECTION TITLES ─────────────────────────────────── */
    .section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* ── LIBRARY ─────────────────────────────────────────── */
    #library { display: grid; gap: 10px; }
    .video-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.15s;
    }
    .video-card:hover { border-color: var(--border-hover); }
    .card-thumb {
      width: 48px;
      height: 34px;
      background: #222;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--muted);
    }
    .card-thumb svg { width: 18px; height: 18px; }
    .card-body { flex: 1; min-width: 0; }
    .card-title {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-slug {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }
    .card-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .icon-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--ink);
      width: 32px;
      height: 32px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.12s, background 0.12s;
    }
    .icon-btn:hover { border-color: var(--border-hover); background: var(--accent-dim); }
    .icon-btn svg { width: 15px; height: 15px; }
    .copied-tip {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--green);
      color: #000;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      pointer-events: none;
      z-index: 99;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .copied-tip.show { opacity: 1; }
    .empty-library {
      padding: 32px 0;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    /* ── UPLOAD PANEL ────────────────────────────────────── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .field { margin-bottom: 14px; }
    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input[type="text"] {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--ink);
      font: inherit;
      font-size: 14px;
      padding: 9px 11px;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: rgba(255,255,255,0.25); }
    input[type="text"]::placeholder { color: var(--muted); }

    /* Drop zone */
    #dropZone {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }
    #dropZone:hover, #dropZone.dragover {
      border-color: rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.03);
    }
    #dropZone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    #dropZone .dz-icon { font-size: 28px; opacity: 0.5; margin-bottom: 8px; }
    #dropZone .dz-label { font-size: 13px; color: var(--muted); }
    #dropZone .dz-label b { color: var(--ink); }
    #dropZone .dz-file { font-size: 13px; color: var(--green); margin-top: 6px; font-weight: 500; }

    /* Progress */
    #progressArea {
      display: none;
      margin-top: 14px;
    }
    .prog-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
    }
    .prog-track {
      height: 5px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
    }
    .prog-fill {
      height: 100%;
      background: var(--green);
      border-radius: 3px;
      width: 0;
      transition: width 0.1s;
    }

    /* Upload button */
    #uploadBtn {
      width: 100%;
      margin-top: 16px;
      padding: 11px;
      background: var(--ink);
      color: #000;
      border: none;
      border-radius: 8px;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    #uploadBtn:hover { background: #fff; }
    #uploadBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Status messages */
    .msg {
      margin-top: 12px;
      font-size: 13px;
      padding: 10px 12px;
      border-radius: 7px;
      display: none;
    }
    .msg.err { background: rgba(248,113,113,0.12); color: var(--red); display: block; }
    .msg.ok  { background: rgba(62,207,142,0.1); color: var(--green); display: block; }

    /* Share URL box */
    #shareBox {
      display: none;
      margin-top: 14px;
      background: rgba(62,207,142,0.07);
      border: 1px solid rgba(62,207,142,0.2);
      border-radius: 8px;
      padding: 12px 14px;
    }
    #shareBox .share-label { font-size: 11px; color: var(--green); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
    #shareBox .share-url {
      font-size: 13px;
      color: var(--ink);
      word-break: break-all;
      line-height: 1.4;
    }
    #copyShareBtn {
      margin-top: 10px;
      background: none;
      border: 1px solid rgba(62,207,142,0.3);
      color: var(--green);
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.12s;
    }
    #copyShareBtn:hover { background: rgba(62,207,142,0.1); }
  </style>
</head>
<body>

<header>
  <div class="logo" id="adminLogo"></div>
  <span class="sub">video library</span>
</header>

<main>
  <!-- Library -->
  <section>
    <div class="section-title">Videos</div>
    <div id="library"><div class="empty-library">Loading…</div></div>
  </section>

  <!-- Upload -->
  <section>
    <div class="section-title">Upload new video</div>
    <div class="panel">
      <div class="field">
        <label for="titleInput">Title</label>
        <input type="text" id="titleInput" placeholder="Jonni's Special Report for Andrea">
      </div>

      <div class="field">
        <label for="slugInput">Slug <span style="font-weight:400">(used in the URL — lowercase, hyphens only)</span></label>
        <input type="text" id="slugInput" placeholder="andrea">
      </div>

      <div class="field">
        <label>Video file</label>
        <div id="dropZone">
          <input type="file" id="fileInput" accept="video/mp4,video/*">
          <div class="dz-icon">🎬</div>
          <div class="dz-label"><b>Click to choose</b> or drag &amp; drop</div>
          <div class="dz-file" id="dzFile"></div>
        </div>
      </div>

      <div id="progressArea">
        <div class="prog-label">
          <span id="progText">Uploading…</span>
          <span id="progPct">0%</span>
        </div>
        <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
      </div>

      <button id="uploadBtn">Upload</button>

      <div class="msg" id="statusMsg"></div>

      <div id="shareBox">
        <div class="share-label">Shareable link</div>
        <div class="share-url" id="shareUrl"></div>
        <button id="copyShareBtn">Copy link</button>
      </div>
    </div>
  </section>
</main>

<div class="copied-tip" id="copiedTip">Copied!</div>

<script>
const titleInput = document.getElementById('titleInput');
const slugInput  = document.getElementById('slugInput');
const fileInput  = document.getElementById('fileInput');
const dropZone   = document.getElementById('dropZone');
const dzFile     = document.getElementById('dzFile');
const uploadBtn  = document.getElementById('uploadBtn');
const progArea   = document.getElementById('progressArea');
const progText   = document.getElementById('progText');
const progPct    = document.getElementById('progPct');
const progFill   = document.getElementById('progFill');
const statusMsg  = document.getElementById('statusMsg');
const shareBox   = document.getElementById('shareBox');
const shareUrl   = document.getElementById('shareUrl');
const copyShareBtn = document.getElementById('copyShareBtn');
const library    = document.getElementById('library');
const copiedTip  = document.getElementById('copiedTip');

let selectedFile = null;

// ── Auto-slug from title ──────────────────────────────────
titleInput.addEventListener('input', () => {
  if (!slugInput.dataset.manual) {
    slugInput.value = titleInput.value
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-|-$/g, '')
      .slice(0, 60);
  }
});
slugInput.addEventListener('input', () => { slugInput.dataset.manual = '1'; });

// ── File picker ───────────────────────────────────────────
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) pickFile(fileInput.files[0]);
});

dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('video/')) pickFile(f);
});

function pickFile(f) {
  selectedFile = f;
  const mb = (f.size / 1024 / 1024).toFixed(1);
  dzFile.textContent = `${f.name}  (${mb} MB)`;
  if (!titleInput.value) {
    const name = f.name.replace(/\.[^.]+$/, '');
    titleInput.value = name;
    titleInput.dispatchEvent(new Event('input'));
  }
}

// ── Upload ─────────────────────────────────────────────────
uploadBtn.addEventListener('click', upload);

async function upload() {
  const title = titleInput.value.trim();
  const slug  = slugInput.value.trim();

  if (!title)         return showMsg('err', 'Please enter a title.');
  if (!slug)          return showMsg('err', 'Please enter a slug.');
  if (!/^[a-z0-9-]+$/.test(slug)) return showMsg('err', 'Slug must be lowercase letters, numbers, hyphens only.');
  if (!selectedFile)  return showMsg('err', 'Please select a video file.');

  setLoading(true);
  hideMsg();
  shareBox.style.display = 'none';

  try {
    // 1. Get presigned upload URL from our API
    const presignRes = await fetch('/api/upload', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slug, contentType: selectedFile.type || 'video/mp4' }),
    });
    if (!presignRes.ok) {
      const e = await presignRes.json();
      throw new Error(e.error || 'Could not get upload URL');
    }
    const { uploadUrl, videoUrl } = await presignRes.json();

    // 2. Upload directly to R2 with progress
    progArea.style.display = 'block';
    await uploadWithProgress(uploadUrl, selectedFile, (pct) => {
      progFill.style.width = `${pct}%`;
      progPct.textContent  = `${pct}%`;
      progText.textContent = pct < 100 ? 'Uploading…' : 'Finalising…';
    });

    // 3. Register metadata
    const regRes = await fetch('/api/videos', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slug, title }),
    });
    if (!regRes.ok) {
      const e = await regRes.json();
      throw new Error(e.error || 'Upload succeeded but metadata save failed');
    }

    // Success
    const watchUrl = `${location.origin}/watch/${slug}`;
    shareUrl.textContent = watchUrl;
    shareBox.style.display = 'block';
    showMsg('ok', '✓ Video uploaded successfully.');
    await loadLibrary();

    // Reset
    titleInput.value = '';
    slugInput.value  = '';
    delete slugInput.dataset.manual;
    selectedFile = null;
    dzFile.textContent = '';
    fileInput.value = '';

  } catch (e) {
    showMsg('err', e.message || 'Upload failed.');
  } finally {
    setLoading(false);
    progArea.style.display = 'none';
  }
}

function uploadWithProgress(url, file, onProgress) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.upload.addEventListener('progress', (e) => {
      if (e.lengthComputable) onProgress(Math.round((e.loaded / e.total) * 100));
    });
    xhr.addEventListener('load', () => {
      if (xhr.status >= 200 && xhr.status < 300) resolve();
      else reject(new Error(`Upload failed (HTTP ${xhr.status})`));
    });
    xhr.addEventListener('error', () => reject(new Error('Network error during upload')));
    xhr.open('PUT', url);
    xhr.setRequestHeader('Content-Type', file.type || 'video/mp4');
    xhr.send(file);
  });
}

function setLoading(on) {
  uploadBtn.disabled = on;
  uploadBtn.textContent = on ? 'Uploading…' : 'Upload';
}

function showMsg(type, text) {
  statusMsg.className = `msg ${type}`;
  statusMsg.textContent = text;
}

function hideMsg() {
  statusMsg.className = 'msg';
  statusMsg.textContent = '';
}

// ── Copy share link ────────────────────────────────────────
copyShareBtn.addEventListener('click', () => {
  navigator.clipboard.writeText(shareUrl.textContent).then(() => flash('Copied!'));
});

function copyUrl(url) {
  navigator.clipboard.writeText(url).then(() => flash('Copied!'));
}

function flash(msg) {
  copiedTip.textContent = msg;
  copiedTip.classList.add('show');
  setTimeout(() => copiedTip.classList.remove('show'), 1800);
}

// ── Library ────────────────────────────────────────────────
async function loadLibrary() {
  try {
    const res  = await fetch('/api/videos');
    if (!res.ok) throw new Error();
    const list = await res.json();

    if (!list.length) {
      library.innerHTML = '<div class="empty-library">No videos yet. Upload one!</div>';
      return;
    }

    library.innerHTML = list.map((v) => {
      const watchUrl = `${location.origin}/watch/${v.slug}`;
      const date = v.createdAt ? new Date(v.createdAt).toLocaleDateString() : '';
      return `
        <div class="video-card">
          <div class="card-thumb">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <polygon points="10,9 16,12 10,15" fill="currentColor" stroke="none"/>
            </svg>
          </div>
          <div class="card-body">
            <div class="card-title">${esc(v.title)}</div>
            <div class="card-slug">/watch/${esc(v.slug)}${date ? '  ·  ' + date : ''}</div>
          </div>
          <div class="card-actions">
            <button class="icon-btn" title="Copy link" onclick="copyUrl('${esc(watchUrl)}')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
            </button>
            <a class="icon-btn" href="${esc(watchUrl)}" target="_blank" title="Open player">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="5,3 19,12 5,21"/>
              </svg>
            </a>
          </div>
        </div>`;
    }).join('');
  } catch {
    library.innerHTML = '<div class="empty-library">Could not load library.</div>';
  }
}

function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

loadLibrary();

const cfg = window.APP;
if (cfg) {
  document.title = `${cfg.name} — Admin`;
  const logo = document.getElementById('adminLogo');
  logo.textContent = cfg.name.toLowerCase();
  logo.insertAdjacentHTML('beforeend', '<span class="logo-dot">.</span>');
  document.documentElement.style.setProperty('--green', cfg.accent);
}
</script>
</body>
</html>
